<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Name Selection Screen -->
  <div id="nameScreen" class="name-screen">
    <div class="name-screen-inner">
      <img src="../icons/icon-48.png" alt="PixelPin" width="36" height="36">
      <h2 class="name-title">Who are you?</h2>
      <p class="name-subtitle">Select your name to see pins assigned to you.</p>
      <div id="nameButtons" class="name-buttons"></div>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="mainScreen" style="display:none;">
    <div class="header">
      <div class="logo">
        <img src="../icons/icon-48.png" alt="PixelPin" width="24" height="24">
        <span class="logo-text">PixelPin</span>
      </div>
      <button id="switchUserBtn" class="switch-user-btn" title="Switch user"></button>
    </div>

    <button id="inspectBtn" class="inspect-btn">
      <span class="inspect-icon">&#9678;</span>
      <span id="inspectLabel">Start Inspecting</span>
    </button>

    <div class="stats-bar">
      <span id="userName" class="stat user-name"></span>
      <span class="stat-divider">|</span>
      <span id="totalCount" class="stat">0 pins</span>
      <span class="stat-divider">|</span>
      <span id="criticalCount" class="stat critical-stat">0 critical</span>
      <span class="stat-divider">|</span>
      <span id="pendingCount" class="stat pending">0 pending</span>
    </div>

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Critical">Critical</button>
      <button class="filter-btn" data-filter="Improvement">Improvement</button>
      <button class="filter-btn" data-filter="Nice-to-have">Nice-to-have</button>
    </div>

    <div id="pinList" class="pin-list">
      <div class="empty-state" id="emptyState">
        <p>No pins assigned to you on this page.</p>
        <p class="hint">Start inspecting to pin feedback.</p>
      </div>
    </div>

    <div class="footer">
      <button id="clearBtn" class="clear-btn" style="display:none;">Clear All Pins</button>
      <div class="keyboard-hint">Press <kbd>Esc</kbd> to stop inspecting</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
