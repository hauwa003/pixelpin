<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="../icons/icon-48.png" alt="PixelPin" width="24" height="24">
      <span class="logo-text">PixelPin</span>
    </div>
  </div>

  <button id="inspectBtn" class="inspect-btn">
    <span class="inspect-icon">&#9678;</span>
    <span id="inspectLabel">Start Inspecting</span>
  </button>

  <div class="stats-bar">
    <span id="totalCount" class="stat">0 pins</span>
    <span class="stat-divider">|</span>
    <span id="pendingCount" class="stat pending">0 pending</span>
  </div>

  <div id="pinList" class="pin-list">
    <div class="empty-state" id="emptyState">
      <p>No pins on this page yet.</p>
      <p class="hint">Start inspecting to pin feedback.</p>
    </div>
  </div>

  <div class="footer">
    <button id="clearBtn" class="clear-btn" style="display:none;">Clear All Pins</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
